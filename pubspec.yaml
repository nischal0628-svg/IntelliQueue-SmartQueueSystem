name: intelliqueue
description: "Final Year Project - Queue Management System"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Navigation & State Management
  get: ^4.7.3

  # UI Utils
  flutter_screenutil: ^5.9.3

  # Local storage (login/session)
  shared_preferences: ^2.2.2

  # SVG Support
  flutter_svg: ^2.2.3

  # Google fonts (for modern UI without storing font files)
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
  
